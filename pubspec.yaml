name: ff_sensitivity_ai
description: FF Sensitivity AI - Smart sensitivity recommendations for Free Fire
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Core
  material_3_adaptive: ^1.0.0
  provider: ^6.0.0
  shared_preferences: ^2.2.0
  intl: ^0.18.0
  
  # Device Info
  device_info_plus: ^9.0.0
  battery_plus: ^4.0.0
  screen: ^0.0.5
  permission_handler: ^11.0.0
  
  # Image & File
  image_picker: ^1.0.0
  image: ^4.0.0
  path_provider: ^2.1.0
  
  # Database
  sqflite: ^2.3.0
  
  # Sharing & URLs
  url_launcher: ^6.1.0
  share_plus: ^7.0.0
  clipboard: ^0.1.3
  
  # Localization
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/icon.png