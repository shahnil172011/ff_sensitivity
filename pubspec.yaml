name: ff_sensitivity_ai
description: FF Sensitivity AI - Smart sensitivity recommendations for Free Fire
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Local Storage
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3

  # Device Information
  device_info_plus: ^11.0.0
  battery_plus: ^6.0.2
  permission_handler: ^11.3.1

  # Image
  image_picker: ^1.1.2
  image: ^4.2.0

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.0
  share_plus: ^10.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
