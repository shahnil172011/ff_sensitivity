name: ff_sensitivity_ai
description: FF Sensitivity AI - Smart sensitivity recommendations for Free Fire
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.0.5
  
  # Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  
  # Device Info
  device_info_plus: ^9.0.0
  battery_plus: ^4.0.2
  screen: ^0.0.5
  
  # Permissions
  permission_handler: ^11.0.1
  
  # Image Handling
  image_picker: ^1.0.4
  image: ^4.0.17
  
  # Sharing & URLs
  url_launcher: ^6.1.14
  share_plus: ^7.2.1
  clipboard: ^0.1.3
  
  # Utilities
  intl: ^0.18.1
  
  # Localization
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/icon.png
